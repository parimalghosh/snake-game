<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SERPENT — Snake Game</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060611;
  --surface: #0c0c22;
  --surface2: #121233;
  --border: #1e1e55;
  --text: #e0dff8;
  --text-dim: #4a4880;
  --snake: #00ff9d;
  --snake-glow: rgba(0,255,157,0.5);
  --food: #ff3e7a;
  --food-glow: rgba(255,62,122,0.5);
  --power-gold: #ffd500;
  --power-gold-glow: rgba(255,213,0,0.5);
  --power-blue: #00c8ff;
  --power-blue-glow: rgba(0,200,255,0.5);
  --power-purple: #c850ff;
  --power-purple-glow: rgba(200,80,255,0.5);
  --grid-line: rgba(30,30,85,0.5);
  --cyan: #00e5ff;
  --cyan-glow: rgba(0,229,255,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(0,255,157,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 85%, rgba(255,62,122,0.04) 0%, transparent 50%);
  pointer-events: none; z-index:0;
}

.game-wrapper {
  position: relative; z-index:1;
  width: 100%; max-width: 480px;
  padding: 12px;
  display: flex; flex-direction: column; align-items: center;
}

/* HEADER */
.game-header {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 900;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--snake), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-controls { display: flex; gap: 6px; }

.h-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}

.h-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.h-btn.active { border-color: var(--snake); color: var(--snake); background: rgba(0,255,157,0.06); }

/* STATS BAR */
.stats-bar {
  width: 100%;
  display: flex; gap: 8px;
  margin-bottom: 10px;
}

.stat-chip {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.stat-chip::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height: 2px;
}

.stat-chip.score-chip::before { background: var(--snake); box-shadow: 0 0 8px var(--snake-glow); }
.stat-chip.high-chip::before { background: var(--power-gold); }
.stat-chip.level-chip::before { background: var(--cyan); }
.stat-chip.length-chip::before { background: var(--food); }

.stat-label {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  font-weight: 600;
}

.stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
}

.score-chip .stat-val { color: var(--snake); }
.high-chip .stat-val { color: var(--power-gold); }
.level-chip .stat-val { color: var(--cyan); }
.length-chip .stat-val { color: var(--food); }

/* Score pop */
.score-pop {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  color: var(--snake);
  pointer-events: none;
  animation: popUp 0.7s ease-out forwards;
}

@keyframes popUp {
  0% { opacity:1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform: translate(-50%,-120%) scale(1.3); }
}

/* CANVAS */
.canvas-container {
  width: 100%;
  aspect-ratio: 1;
  max-width: 420px;
  border-radius: 14px;
  overflow: hidden;
  border: 2px solid var(--border);
  position: relative;
  box-shadow: 0 0 30px rgba(0,0,0,0.4), inset 0 0 60px rgba(0,0,0,0.3);
  touch-action: none;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

/* OVERLAY */
.game-overlay {
  position: absolute;
  inset: 0;
  background: rgba(6,6,17,0.88);
  backdrop-filter: blur(6px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  border-radius: 14px;
  gap: 10px;
  padding: 20px;
}

.game-overlay.active { display: flex; }

.overlay-icon { font-size: 3rem; margin-bottom: 4px; }

.overlay-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: 3px;
}

.overlay-title.win-title {
  background: linear-gradient(135deg, var(--snake), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.overlay-sub {
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 500;
  text-align: center;
}

.overlay-stats {
  display: flex; gap: 20px;
  margin: 8px 0;
}

.o-stat { text-align: center; }
.o-stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 800; }
.o-stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }

.play-btn {
  background: linear-gradient(135deg, var(--snake), var(--cyan));
  color: var(--bg);
  border: none;
  border-radius: 12px;
  padding: 14px 36px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px var(--snake-glow);
  margin-top: 8px;
}

.play-btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 30px var(--snake-glow); }

/* POWER-UP INDICATOR */
.power-indicator {
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 1px;
  z-index: 5;
  display: none;
  animation: fadeSlide 0.3s ease;
}

.power-indicator.active { display: flex; align-items: center; gap: 6px; }

@keyframes fadeSlide {
  0% { opacity:0; transform: translateX(-50%) translateY(-8px); }
  100% { opacity:1; transform: translateX(-50%) translateY(0); }
}

.power-timer-bar {
  width: 50px; height: 4px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}

.power-timer-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.1s linear;
}

/* MODE BAR */
.mode-bar {
  width: 100%;
  display: flex; gap: 8px;
  margin-top: 10px;
}

.mode-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  transition: all 0.2s;
}

.mode-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.mode-btn.active { border-color: var(--snake); color: var(--snake); background: rgba(0,255,157,0.06); }

/* FOOTER */
.game-footer {
  text-align: center;
  margin-top: 10px;
  font-size: 0.62rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.game-footer kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.55rem;
}

@media (max-width: 420px) {
  .game-wrapper { padding: 8px; }
  .logo { font-size: 1rem; letter-spacing: 2px; }
  .stat-val { font-size: 0.95rem; }
}
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- HEADER -->
  <div class="game-header">
    <div class="logo">NEON SERPENT</div>
    <div class="header-controls">
      <button class="h-btn" id="pauseBtn" onclick="togglePause()" title="Pause">⏸</button>
      <button class="h-btn" id="soundBtn" onclick="toggleSound()" title="Sound">🔊</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-chip score-chip" id="scoreChip">
      <div class="stat-label">Score</div>
      <div class="stat-val" id="scoreVal">0</div>
    </div>
    <div class="stat-chip high-chip">
      <div class="stat-label">Best</div>
      <div class="stat-val" id="highVal">0</div>
    </div>
    <div class="stat-chip level-chip">
      <div class="stat-label">Level</div>
      <div class="stat-val" id="levelVal">1</div>
    </div>
    <div class="stat-chip length-chip">
      <div class="stat-label">Length</div>
      <div class="stat-val" id="lengthVal">3</div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- Power-up indicator -->
    <div class="power-indicator" id="powerIndicator">
      <span id="powerLabel">⚡ SPEED</span>
      <div class="power-timer-bar"><div class="power-timer-fill" id="powerTimerFill"></div></div>
    </div>

    <!-- Start Overlay -->
    <div class="game-overlay active" id="startOverlay">
      <div class="overlay-icon">🐍</div>
      <div class="overlay-title win-title">NEON SERPENT</div>
      <div class="overlay-sub">Use arrow keys or swipe to control the snake.<br>Eat food, grab power-ups, don't crash!</div>
      <button class="play-btn" onclick="startGame()">▶ Start Game</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="game-overlay" id="gameOverOverlay">
      <div class="overlay-icon">💀</div>
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-stats">
        <div class="o-stat"><div class="o-stat-val" id="finalScore" style="color:var(--snake)">0</div><div class="o-stat-label">Score</div></div>
        <div class="o-stat"><div class="o-stat-val" id="finalLength" style="color:var(--food)">0</div><div class="o-stat-label">Length</div></div>
        <div class="o-stat"><div class="o-stat-val" id="finalLevel" style="color:var(--cyan)">0</div><div class="o-stat-label">Level</div></div>
      </div>
      <div class="overlay-sub" id="newHighLabel" style="color:var(--power-gold);display:none;">🏆 New High Score!</div>
      <button class="play-btn" onclick="startGame()">🔄 Play Again</button>
    </div>

    <!-- Pause Overlay -->
    <div class="game-overlay" id="pauseOverlay">
      <div class="overlay-icon">⏸</div>
      <div class="overlay-title">PAUSED</div>
      <div class="overlay-sub">Press Space or tap to resume</div>
    </div>
  </div>

  <!-- MODE BAR -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="wall" onclick="setWallMode(this, 'wall')">🧱 Walls Kill</button>
    <button class="mode-btn" data-mode="wrap" onclick="setWallMode(this, 'wrap')">🔄 Wrap Around</button>
    <button class="mode-btn" data-mode="speed" onclick="setWallMode(this, 'speed')">⚡ Speed Rush</button>
  </div>

  <div class="game-footer">
    <kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> move &nbsp;·&nbsp; <kbd>Space</kbd> pause &nbsp;·&nbsp; swipe on mobile
  </div>
</div>

<script>
// ===== CONSTANTS =====
const GRID_SIZE = 20;
const CELL_COUNT = 20;
const CANVAS_SIZE = GRID_SIZE * CELL_COUNT;

// ===== STATE =====
let canvas, ctx;
let snake, direction, nextDirection;
let food, powerUp;
let score, level, highScore;
let gameRunning, gamePaused, gameLoop;
let baseSpeed, currentSpeed;
let wallMode = 'wall'; // 'wall', 'wrap', 'speed'
let particles = [];
let trail = [];
let activePower = null;
let powerTimer = 0;
let powerDuration = 0;
let soundEnabled = true;
let frameCount = 0;

// Audio context for simple sounds
let audioCtx;
function initAudio() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}

function playTone(freq, duration, type='sine', vol=0.15) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// ===== INIT =====
function init() {
  canvas = document.getElementById('gameCanvas');
  canvas.width = CANVAS_SIZE;
  canvas.height = CANVAS_SIZE;
  ctx = canvas.getContext('2d');
  highScore = parseInt(localStorage.getItem('ns_high') || '0');
  document.getElementById('highVal').textContent = highScore;
  drawGrid();
}

// ===== START =====
function startGame() {
  initAudio();
  clearInterval(gameLoop);

  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  level = 1;
  particles = [];
  trail = [];
  activePower = null;
  powerTimer = 0;
  frameCount = 0;

  baseSpeed = wallMode === 'speed' ? 90 : 130;
  currentSpeed = baseSpeed;

  hideAllOverlays();
  spawnFood();
  powerUp = null;
  updateUI();

  gameRunning = true;
  gamePaused = false;
  gameLoop = setInterval(tick, currentSpeed);
}

// ===== GAME LOOP =====
function tick() {
  if (gamePaused) return;
  frameCount++;

  direction = { ...nextDirection };

  // Move head
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // Wall handling
  if (wallMode === 'wrap' || wallMode === 'speed') {
    head.x = (head.x + CELL_COUNT) % CELL_COUNT;
    head.y = (head.y + CELL_COUNT) % CELL_COUNT;
  } else {
    if (head.x < 0 || head.x >= CELL_COUNT || head.y < 0 || head.y >= CELL_COUNT) {
      gameOver(); return;
    }
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);

  // Add trail
  trail.push({ x: head.x, y: head.y, life: 8 });

  // Check food
  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    ate = true;
    const pts = activePower === 'double' ? 20 : 10;
    score += pts;
    spawnParticles(food.x, food.y, '#ff3e7a', 10);
    playTone(600, 0.12, 'square');
    playTone(900, 0.1, 'sine');
    showScorePop(`+${pts}`);
    spawnFood();

    // Level up every 50 pts
    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel > level) {
      level = newLevel;
      baseSpeed = Math.max(50, (wallMode === 'speed' ? 90 : 130) - (level - 1) * 8);
      if (activePower !== 'slow' && activePower !== 'speed') {
        updateSpeed(baseSpeed);
      }
      playTone(1200, 0.15, 'triangle');
    }

    // Maybe spawn power-up
    if (!powerUp && Math.random() < 0.3) spawnPowerUp();
  } else {
    snake.pop();
  }

  // Check power-up
  if (powerUp && head.x === powerUp.x && head.y === powerUp.y) {
    activatePower(powerUp.type);
    spawnParticles(powerUp.x, powerUp.y, powerUp.color, 12);
    playTone(1000, 0.1, 'sine');
    playTone(1400, 0.12, 'triangle');
    powerUp = null;
  }

  // Power-up timer
  if (activePower) {
    powerTimer--;
    updatePowerIndicator();
    if (powerTimer <= 0) deactivatePower();
  }

  // Decay trail
  trail = trail.filter(t => { t.life--; return t.life > 0; });

  // Update particles
  particles = particles.filter(p => { p.life--; p.x += p.vx; p.y += p.vy; p.vy += 0.1; return p.life > 0; });

  updateUI();
  draw();
}

// ===== DRAWING =====
function draw() {
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  drawGrid();
  drawTrail();
  drawFood();
  if (powerUp) drawPowerUp();
  drawSnake();
  drawParticles();
}

function drawGrid() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  ctx.strokeStyle = 'rgba(30,30,80,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= CELL_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(i * GRID_SIZE, 0);
    ctx.lineTo(i * GRID_SIZE, CANVAS_SIZE);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * GRID_SIZE);
    ctx.lineTo(CANVAS_SIZE, i * GRID_SIZE);
    ctx.stroke();
  }
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const x = seg.x * GRID_SIZE;
    const y = seg.y * GRID_SIZE;
    const progress = i / snake.length;

    if (i === 0) {
      // Head — brighter glow
      ctx.shadowColor = 'rgba(0,255,157,0.8)';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#00ff9d';
      roundRect(ctx, x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 5);
      ctx.fill();

      // Eyes
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#060611';
      const eyeSize = 3;
      if (direction.x === 1) { ctx.fillRect(x+13, y+5, eyeSize, eyeSize); ctx.fillRect(x+13, y+12, eyeSize, eyeSize); }
      else if (direction.x === -1) { ctx.fillRect(x+4, y+5, eyeSize, eyeSize); ctx.fillRect(x+4, y+12, eyeSize, eyeSize); }
      else if (direction.y === -1) { ctx.fillRect(x+5, y+4, eyeSize, eyeSize); ctx.fillRect(x+12, y+4, eyeSize, eyeSize); }
      else { ctx.fillRect(x+5, y+13, eyeSize, eyeSize); ctx.fillRect(x+12, y+13, eyeSize, eyeSize); }
    } else {
      // Body — gradient fade
      const alpha = 1 - progress * 0.6;
      const g = Math.round(255 * (1 - progress * 0.5));
      ctx.shadowColor = `rgba(0,${g},157,${alpha * 0.4})`;
      ctx.shadowBlur = 8;
      ctx.fillStyle = `rgba(0,${g},${Math.round(157 - progress * 60)},${alpha})`;
      roundRect(ctx, x + 1.5, y + 1.5, GRID_SIZE - 3, GRID_SIZE - 3, 4);
      ctx.fill();
    }
  });
  ctx.shadowBlur = 0;
}

function drawFood() {
  const x = food.x * GRID_SIZE;
  const y = food.y * GRID_SIZE;
  const pulse = 1 + Math.sin(frameCount * 0.15) * 0.12;

  ctx.save();
  ctx.translate(x + GRID_SIZE / 2, y + GRID_SIZE / 2);
  ctx.scale(pulse, pulse);

  ctx.shadowColor = 'rgba(255,62,122,0.8)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#ff3e7a';
  ctx.beginPath();
  ctx.arc(0, 0, GRID_SIZE / 2 - 3, 0, Math.PI * 2);
  ctx.fill();

  // Inner dot
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(-2, -2, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPowerUp() {
  const x = powerUp.x * GRID_SIZE;
  const y = powerUp.y * GRID_SIZE;
  const pulse = 1 + Math.sin(frameCount * 0.2) * 0.15;
  const bounce = Math.sin(frameCount * 0.1) * 2;

  ctx.save();
  ctx.translate(x + GRID_SIZE / 2, y + GRID_SIZE / 2 + bounce);
  ctx.scale(pulse, pulse);

  ctx.shadowColor = powerUp.glow;
  ctx.shadowBlur = 20;
  ctx.fillStyle = powerUp.color;

  // Diamond shape
  ctx.beginPath();
  ctx.moveTo(0, -7);
  ctx.lineTo(7, 0);
  ctx.lineTo(0, 7);
  ctx.lineTo(-7, 0);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.arc(-1, -1, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawTrail() {
  trail.forEach(t => {
    const alpha = t.life / 8 * 0.15;
    ctx.fillStyle = `rgba(0,255,157,${alpha})`;
    ctx.fillRect(t.x * GRID_SIZE + 4, t.y * GRID_SIZE + 4, GRID_SIZE - 8, GRID_SIZE - 8);
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== SPAWNING =====
function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * CELL_COUNT), y: Math.floor(Math.random() * CELL_COUNT) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (powerUp && powerUp.x === pos.x && powerUp.y === pos.y));
  food = pos;
}

function spawnPowerUp() {
  const types = [
    { type: 'speed', color: '#ffd500', glow: 'rgba(255,213,0,0.5)', label: '⚡ SPEED BOOST' },
    { type: 'slow', color: '#00c8ff', glow: 'rgba(0,200,255,0.5)', label: '❄ SLOW-MO' },
    { type: 'double', color: '#c850ff', glow: 'rgba(200,80,255,0.5)', label: '✦ 2X POINTS' }
  ];
  const t = types[Math.floor(Math.random() * types.length)];

  let pos;
  do {
    pos = { x: Math.floor(Math.random() * CELL_COUNT), y: Math.floor(Math.random() * CELL_COUNT) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (pos.x === food.x && pos.y === food.y));

  powerUp = { ...pos, ...t };
}

// ===== POWER-UPS =====
function activatePower(type) {
  activePower = type;
  powerDuration = 80;
  powerTimer = powerDuration;

  const labels = { speed: '⚡ SPEED BOOST', slow: '❄ SLOW-MO', double: '✦ 2X POINTS' };
  const colors = { speed: '#ffd500', slow: '#00c8ff', double: '#c850ff' };
  document.getElementById('powerLabel').textContent = labels[type];
  document.getElementById('powerTimerFill').style.background = colors[type];
  document.getElementById('powerIndicator').classList.add('active');

  if (type === 'speed') updateSpeed(Math.max(40, baseSpeed - 40));
  else if (type === 'slow') updateSpeed(baseSpeed + 50);
}

function deactivatePower() {
  activePower = null;
  document.getElementById('powerIndicator').classList.remove('active');
  updateSpeed(baseSpeed);
}

function updatePowerIndicator() {
  const pct = (powerTimer / powerDuration) * 100;
  document.getElementById('powerTimerFill').style.width = pct + '%';
}

function updateSpeed(speed) {
  currentSpeed = speed;
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, currentSpeed);
}

// ===== PARTICLES =====
function spawnParticles(cellX, cellY, color, count) {
  const cx = cellX * GRID_SIZE + GRID_SIZE / 2;
  const cy = cellY * GRID_SIZE + GRID_SIZE / 2;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      size: 2 + Math.random() * 3,
      life: 15 + Math.floor(Math.random() * 10),
      maxLife: 25,
      color: color
    });
  }
}

// ===== UI =====
function updateUI() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('levelVal').textContent = level;
  document.getElementById('lengthVal').textContent = snake.length;
}

function showScorePop(text) {
  const chip = document.getElementById('scoreChip');
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  if (activePower === 'double') pop.style.color = '#c850ff';
  chip.appendChild(pop);
  setTimeout(() => pop.remove(), 700);
}

// ===== GAME OVER =====
function gameOver() {
  gameRunning = false;
  clearInterval(gameLoop);
  playTone(200, 0.3, 'sawtooth', 0.2);
  playTone(150, 0.4, 'square', 0.15);

  // Explosion particles from head
  spawnParticles(snake[0].x, snake[0].y, '#ff3e7a', 20);
  draw();

  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalLength').textContent = snake.length;
  document.getElementById('finalLevel').textContent = level;

  const isNewHigh = score > highScore;
  if (isNewHigh) {
    highScore = score;
    localStorage.setItem('ns_high', highScore);
    document.getElementById('highVal').textContent = highScore;
  }
  document.getElementById('newHighLabel').style.display = isNewHigh ? 'block' : 'none';

  setTimeout(() => {
    document.getElementById('gameOverOverlay').classList.add('active');
  }, 400);
}

// ===== PAUSE =====
function togglePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
  document.getElementById('pauseOverlay').classList.toggle('active', gamePaused);
  document.getElementById('pauseBtn').textContent = gamePaused ? '▶' : '⏸';
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  document.getElementById('soundBtn').classList.toggle('active', !soundEnabled);
}

function setWallMode(btn, mode) {
  wallMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function hideAllOverlays() {
  document.querySelectorAll('.game-overlay').forEach(o => o.classList.remove('active'));
}

// ===== INPUT =====
document.addEventListener('keydown', (e) => {
  const key = e.key;

  if (key === ' ') {
    e.preventDefault();
    if (gamePaused || gameRunning) togglePause();
    return;
  }

  if (!gameRunning || gamePaused) return;

  switch(key) {
    case 'ArrowUp': case 'w': case 'W':
      if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
      e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S':
      if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
      e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A':
      if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
      e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D':
      if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
      e.preventDefault(); break;
  }
});

// Touch / Swipe
let touchStartX, touchStartY;
const container = document.getElementById('canvasContainer');

container.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

container.addEventListener('touchend', (e) => {
  if (!touchStartX) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) {
    // Tap — resume if paused
    if (gamePaused) togglePause();
    return;
  }

  if (!gameRunning || gamePaused) return;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
    else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
  } else {
    if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
    else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
  }
  touchStartX = null;
}, { passive: true });

// ===== INIT =====
init();
</script>
